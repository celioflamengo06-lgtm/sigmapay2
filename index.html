    <div id="root"></div>

<script>
(function() {
  function criarModalPix() {
    var modal = document.createElement('div');
    modal.id = 'pix-modal';
    modal.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:99999;overflow-y:auto;';
    modal.innerHTML = [
      '<div style="background:#fff;border-radius:16px;max-width:440px;margin:32px auto;padding:28px 24px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.35);">',
        '<button id="pix-modal-x" style="position:absolute;top:12px;right:16px;font-size:26px;line-height:1;background:none;border:none;cursor:pointer;color:#888;">&times;</button>',
        '<div style="text-align:center;margin-bottom:20px;">',
          '<div style="background:#1351B4;border-radius:50%;width:52px;height:52px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;">',
            '<svg width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.4-1.4z"/></svg>',
          '</div>',
          '<h2 style="margin:0 0 4px;font-size:18px;font-weight:700;color:#1351B4;">PIX Gerado!</h2>',
          '<p style="margin:0;font-size:13px;color:#666;">Copie o código ou escaneie o QR Code para pagar</p>',
        '</div>',

        '<div style="margin-bottom:18px;">',
          '<p style="font-size:13px;font-weight:600;color:#333;margin:0 0 6px;">&#128203; Código PIX Copia e Cola:</p>',
          '<div id="pix-modal-code" style="background:#f4f4f4;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-family:monospace;font-size:11px;word-break:break-all;max-height:80px;overflow-y:auto;color:#111;user-select:all;"></div>',
          '<button id="pix-copiar-btn" style="margin-top:10px;width:100%;padding:11px;background:#1351B4;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">Copiar Código PIX</button>',
        '</div>',

        '<div id="pix-modal-qr" style="text-align:center;margin-bottom:18px;">',
          '<p style="font-size:13px;font-weight:600;color:#333;margin:0 0 8px;">ou escaneie o QR Code:</p>',
          '<div style="display:inline-block;padding:12px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;">',
            '<img id="pix-modal-qr-img" src="" style="width:180px;height:180px;display:block;" alt="QR Code PIX"/>',
          '</div>',
        '</div>',

        '<div style="background:#eef3ff;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:12px;color:#1351B4;line-height:1.6;">',
          '<strong>Como pagar:</strong><br>',
          '1. Abra o app do seu banco<br>',
          '2. Acesse PIX &rarr; Pagar com código<br>',
          '3. Cole o código ou escaneie o QR Code<br>',
          '4. Confirme o pagamento',
        '</div>',

        '<button id="pix-modal-fechar" style="width:100%;padding:10px;background:#f0f0f0;color:#444;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;">Fechar</button>',
      '</div>'
    ].join('');
    document.body.appendChild(modal);

    document.getElementById('pix-modal-x').onclick = fecharModal;
    document.getElementById('pix-modal-fechar').onclick = fecharModal;
    modal.addEventListener('click', function(e) { if (e.target === modal) fecharModal(); });

    document.getElementById('pix-copiar-btn').addEventListener('click', function() {
      var code = document.getElementById('pix-modal-code').innerText;
      navigator.clipboard.writeText(code).then(function() {
        var btn = document.getElementById('pix-copiar-btn');
        btn.textContent = '✓ Copiado!';
        btn.style.background = '#16a34a';
        setTimeout(function() {
          btn.textContent = 'Copiar Código PIX';
          btn.style.background = '#1351B4';
        }, 2000);
      }).catch(function() {
        var el = document.getElementById('pix-modal-code');
        var range = document.createRange();
        range.selectNodeContents(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
      });
    });
  }

  function abrirModal(pixCode, qrImg) {
    if (!document.getElementById('pix-modal')) criarModalPix();
    document.getElementById('pix-modal-code').innerText = pixCode || '';
    var qrSection = document.getElementById('pix-modal-qr');
    var qrImgEl = document.getElementById('pix-modal-qr-img');
    qrSection.style.display = 'block';
    if (pixCode) {
      qrImgEl.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=10&data=' + encodeURIComponent(pixCode);
    } else if (qrImg) {
      qrImgEl.src = qrImg;
    } else {
      qrSection.style.display = 'none';
    }
    document.getElementById('pix-modal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function fecharModal() {
    var m = document.getElementById('pix-modal');
    if (m) m.style.display = 'none';
    document.body.style.overflow = '';
  }

  var _fetch = window.fetch;
  window.fetch = function(input, init) {
    var url = typeof input === 'string' ? input : ((input && input.url) || '');
    var method = (init && init.method || 'GET').toUpperCase();
    var promise = _fetch.apply(this, arguments);
    if (url.indexOf('/api/pix') !== -1 && method === 'POST') {
      return promise.then(function(response) {
        var cloned = response.clone();
        cloned.json().then(function(data) {
          var code = data.pix_code || data.pixCode || data.brcode || data.payload || '';
          var img  = data.qr_code_image || data.qrCodeImage || '';
          if (code) setTimeout(function() { abrirModal(code, img); }, 200);
        }).catch(function() {});
        return response;
      });
    }
    return promise;
  };
})();
</script>
</body>
